name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/ember_code/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -q

  # The shared web UI lives under ``clients/web`` and is consumed by
  # the Tauri / VSCode / JetBrains shells. Typecheck + tests run on
  # every push so a regression doesn't ride through to a release
  # build.
  # Shared web UI lives under ``clients/web`` and is consumed by the
  # Tauri / VSCode / JetBrains shells. Typecheck + tests run on every
  # platform so a path-separator or shell-quoting regression doesn't
  # ride through to a release build undetected.
  web:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    defaults:
      run:
        working-directory: clients/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Unit tests
        run: npx vitest run

  # The JetBrains plugin compiles Kotlin against the IntelliJ
  # Platform 2024.2.4 SDK. Builds on every host platform because the
  # plugin's own runtime (uv download, venv bootstrap) is exercised
  # on each — we want CI to catch path-handling or process-spawn
  # bugs in ``EmberRuntime``/``EmberBackendService`` per OS, not
  # just at user-install time. The distributable zip is still
  # platform-independent (uv is fetched at runtime); the matrix
  # validates the launcher logic, not the artifact contents.
  jetbrains-plugin:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: clients/web/package-lock.json

      - name: Install + build shared web UI
        run: |
          cd clients/web
          npm ci
          npm run build

      - name: Stage web bundle for plugin
        shell: bash
        run: |
          mkdir -p clients/jetbrains/src/main/resources/webui
          cp -R clients/web/dist/. clients/jetbrains/src/main/resources/webui/

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Build plugin (Unix)
        if: runner.os != 'Windows'
        run: |
          cd clients/jetbrains
          ./gradlew buildPlugin --no-daemon

      - name: Build plugin (Windows)
        if: runner.os == 'Windows'
        run: |
          cd clients/jetbrains
          .\gradlew.bat buildPlugin --no-daemon

      # Only the Linux build is uploaded — the distributable zip is
      # platform-independent (uv is fetched per-host at runtime), so
      # there's no value in archiving three identical artifacts. The
      # mac / Windows jobs exist to exercise the launcher build path,
      # not to ship a deliverable.
      - name: Upload plugin artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ember-code-jetbrains
          path: clients/jetbrains/build/distributions/*.zip
          retention-days: 14

  # VSCode extension — same matrix story as the JetBrains plugin:
  # the artifact (VSIX) is platform-independent because uv is fetched
  # at runtime, but we exercise the extension's launcher code on
  # each platform to catch path / process-spawn regressions before a
  # user does. Only Linux uploads the VSIX.
  vscode-plugin:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            clients/web/package-lock.json
            clients/vscode/package-lock.json

      - name: Install + build shared web UI
        run: |
          cd clients/web
          npm ci
          npm run build

      - name: Install + build VSCode extension
        run: |
          cd clients/vscode
          npm install --no-audit --no-fund
          npm run package

      - name: Upload VSIX artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ember-code-vscode
          path: clients/vscode/*.vsix
          retention-days: 14
