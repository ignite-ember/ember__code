[alembic]
; ``alembic.ini`` and ``migrations/`` live INSIDE the ``ember_code``
; package so the wheel ships them — non-source-tree installs (Homebrew,
; pipx, system pip) need to find them too. ``%(here)s`` expands to the
; directory containing this file (``src/ember_code/`` in dev,
; ``<site-packages>/ember_code/`` in a wheel install) — using it
; avoids any dependency on CWD, since alembic resolves bare relative
; paths against CWD rather than the ini location.
script_location = %(here)s/migrations
; Add the package's parent to sys.path so ``ember_code`` is importable
; when ``alembic`` is invoked outside an editable install (autogenerate
; from a non-installed checkout, etc.). In a wheel layout this is
; ``site-packages/`` — already on sys.path, harmless.
prepend_sys_path = %(here)s/..
path_separator = os
; URL is overridden programmatically per-call (Database.__init__) — this
; placeholder only exists to satisfy ``alembic revision --autogenerate``.
sqlalchemy.url = sqlite:///%(here)s/.alembic-autogenerate-tmp.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
